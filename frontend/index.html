<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===================== SEO: Core ===================== -->
    <title>PHJC School Azhin-Kasa | School Management Portal</title>
    <meta name="description" content="PHJC School Azhin-Kasa's official school management portal. Access student records, exam results, alumni network, staff information, and more." />
    <meta name="keywords" content="PHJC school, Azhin-Kasa school, school management Nigeria, student portal, school results Nigeria, PHJC alumni" />
    <meta name="author" content="PHJC School Azhin-Kasa" />
    <meta name="robots" content="index, follow" />

    <!-- ===================== SEO: Canonical URL ===================== -->
    <link rel="canonical" href="https://phjcschool.com.ng" />

    <!-- ===================== SEO: Open Graph (Facebook/WhatsApp previews) ===================== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://phjcschool.com.ng" />
    <meta property="og:title" content="PHJC School Azhin-Kasa | School Management Portal" />
    <meta property="og:description" content="PHJC School Azhin-Kasa's official school management portal. Access student records, exam results, alumni network, and staff information." />
    <meta property="og:image" content="https://phjcschool.com.ng/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="PHJC School Azhin-Kasa" />
    <meta property="og:locale" content="en_NG" />

    <!-- ===================== SEO: Twitter Card ===================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://phjcschool.com.ng" />
    <meta name="twitter:title" content="PHJC School Azhin-Kasa | School Management Portal" />
    <meta name="twitter:description" content="Official school management portal for PHJC School Azhin-Kasa, Nigeria." />
    <meta name="twitter:image" content="https://phjcschool.com.ng/og-image.png" />

    <!-- ===================== SEO: Geo Tags (helps with local/Nigerian search) ===================== -->
    <meta name="geo.region" content="NG" />
    <meta name="geo.placename" content="Nigeria" />

    <!-- ===================== SEO: Structured Data (JSON-LD) ===================== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "School",
      "name": "PHJC School Azhin-Kasa",
      "url": "https://phjcschool.com.ng",
      "logo": "https://phjcschool.com.ng/logo.png",
      "description": "PHJC School Azhin-Kasa is a Nigerian school offering quality education with a modern school management system for students, staff, and alumni.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NG"
      },
      "sameAs": []
    }
    </script>

    <!-- ===================== Favicon ===================== -->
    <link id="favicon" rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- ===================== Fonts ===================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
